<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jago Badminton - Beranda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #121212; color: #fff; overflow-x: hidden; }
        header { background: #1f1f1f; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ffcc00; }
        .logo { font-size: 24px; font-weight: bold; color: #ffcc00; animation: bounce 2s infinite; }
        nav a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 500; transition: 0.3s; }
        nav a:hover, nav a.active { color: #ffcc00; }
        
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://unsplash.com') center/cover; }
        .hero h1 { font-size: 50px; margin-bottom: 20px; animation: fadeInDown 1.5s ease; }
        .hero p { font-size: 20px; color: #ccc; margin-bottom: 30px; animation: fadeInUp 1.5s ease; }
        .btn { padding: 12px 30px; background: #ffcc00; color: #121212; font-weight: bold; text-decoration: none; border-radius: 5px; transition: 0.3s; animation: pulse 2s infinite; }
        .btn:hover { background: #fff; }
        
        .audio-container { background: #1f1f1f; padding: 15px; text-align: center; border-top: 1px solid #333; }

        /* Animasi CSS */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">🏸 Jago Badminton</div>
        <nav>
            <a href="index.html" class="active">Beranda</a>
            <a href="servis.html">Servis</a>
            <a href="lob.html">Pukulan Lob</a>
            <a href="smash.html">Smash</a>
            <a href="drop-net.html">Drop & Netting</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Kuasai Lapangan, Jadi Juara!</h1>
        <p>Pelajari 5 teknik dasar badminton esensial untuk meningkatkan performa bermain Anda.</p>
        <a href="servis.html" class="btn">Mulai Belajar</a>
    </section>

    <div class="audio-container">
        <p style="margin-bottom: 5px; color: #ffcc00;">🎵 Musik Latar Website:</p>
        <audio controls autoplay loop>
            <source src="assets/audio-bg.mp3" type="audio/mpeg">
            Browser Anda tidak mendukung elemen audio.
        </audio>
    </div>

</body>
</html>
