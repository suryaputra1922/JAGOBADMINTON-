<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jago Badminton - 5 Slide Teknik Dasar</title>
    <style>
        /* --- CSS GLOBAL & RESET --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* Background bernuansa lapangan badminton dengan efek gelap agar teks terbaca jelas */
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://unsplash.com') center/cover no-repeat fixed;
            color: #fff; 
            overflow-x: hidden; 
            padding-bottom: 120px; 
            min-height: 100vh;
        }

        /* --- NAVIGASI HEADER --- */
        header { 
            background: rgba(25, 25, 25, 0.95); 
            padding: 20px; 
            text-align: center;
            border-bottom: 3px solid #ffcc00; 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { 
            font-size: 24px; 
            font-weight: bold; 
            color: #ffcc00; 
            animation: bounce 2s infinite; 
            margin-bottom: 15px;
        }
        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        nav button { 
            background: none;
            border: none;
            color: #fff; 
            font-weight: 500; 
            font-size: 15px;
            transition: 0.3s; 
            cursor: pointer;
            padding: 5px 10px;
        }
        nav button:hover, nav button.active { 
            color: #ffcc00; 
            border-bottom: 2px solid #ffcc00;
        }

        /* --- SISTEM NAVIGASI SLIDE (SPA) --- */
        .slide {
            display: none; 
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            padding: 40px 20px;
        }
        .slide.active-slide {
            display: block; 
            opacity: 1;
            transform: translateY(0);
        }

        /* --- STYLE SLIDE 1: BERANDA --- */
        .hero { 
            height: 45vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed #ffcc00;
            border-radius: 10px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .hero h1 { 
            font-size: 40px; 
            margin-bottom: 20px; 
            color: #ffcc00;
            animation: fadeInDown 1s ease; 
        }
        .hero p { 
            font-size: 18px; 
            color: #ccc; 
            margin-bottom: 30px; 
            max-width: 600px;
            animation: fadeInUp 1s ease; 
        }
        
        /* Grid Menu Utama di Beranda */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1000px;
            margin: 30px auto 0 auto;
        }

        /* --- TOMBOL / BUTTONS --- */
        .btn { 
            padding: 15px 20px; 
            background: #ffcc00; 
            color: #121212; 
            font-weight: bold; 
            text-align: center;
            border-radius: 5px; 
            transition: 0.3s; 
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.2);
            font-size: 16px;
        }
        .btn:hover { 
            background: #fff; 
            transform: scale(1.05);
        }
        .btn-large {
            padding: 15px 40px;
            font-size: 18px;
            animation: pulse 2s infinite;
        }
        
        /* Navigasi Bawah (Kembali & Lanjut) */
        .slide-nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 20px;
        }
        .btn-nav-prev {
            background: #444;
            color: #fff;
        }
        .btn-nav-prev:hover {
            background: #666;
        }

        /* --- WADAH ISI PENJELASAN TEKNIK (SLIDE 2, 3, 4, 5) --- */
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 35px; 
            background: rgba(20, 20, 20, 0.9); 
            border-radius: 10px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            border-left: 6px solid #ffcc00;
        }
        .container h1 { 
            color: #ffcc00; 
            margin-bottom: 25px; 
            font-size: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .container h2 {
            color: #ffcc00;
            margin: 25px 0 10px 0;
            font-size: 22px;
        }
        .container p { 
            line-height: 1.8; 
            color: #eee; 
            margin-bottom: 15px; 
            font-size: 16px;
        }
        .step-list {
            margin-left: 25px;
            margin-bottom: 25px;
            color: #ddd;
            line-height: 1.8;
        }
        .step-list li {
            margin-bottom: 10px;
            list-style-type: square;
        }
        
        /* Kotak Tempat Video File Lokal */
        .video-box { 
            text-align: center; 
            margin: 35px 0; 
            background: #000; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid rgba(255, 204, 0, 0.3);
        }
        .video-box h3 {
            margin-bottom: 15px;
            color: #ffcc00;
        }
        video { 
            width: 100%; 
            max-width: 650px; 
            border: 2px solid #ffcc00; 
            border-radius: 5px;
        }

        /* Desain Khusus Slide 4: Smash (Aksen Merah) */
        #slide-smash .container { border-left-color: #ff4444; }
        #slide-smash h1, #slide-smash h2, #slide-smash h3, #slide-smash video { color: #ff4444; border-color: #ff4444; }
        #slide-smash .btn-next-special { background: #ff4444; color: #fff; }
        #slide-smash .btn-next-special:hover { background: #fff; color: #121212; }

        /* Tampilan Berdampingan untuk Slide 5 */
        .grid-layout { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-top: 30px; 
        }
        .card { 
            background: rgba(35, 35, 35, 0.95); 
            padding: 20px; 
            border-radius: 8px; 
            border-top: 4px solid #ffcc00; 
        }
        .card video {
            margin-top: 15px;
        }

        /* --- AUDIO FIXED PLAYER (BAWAH) --- */
        .audio-footer { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1f1f1f; 
            padding: 15px; 
            text-align: center; 
            border-top: 2px solid #ffcc00; 
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        /* --- ANIMASI CSS --- */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* Responsif HP */
        @media (max-width: 768px) {
            .menu-grid { grid-template-columns: 1fr; padding: 0 20px; }
            .grid-layout { grid-template-columns: 1fr; }
            header { padding: 15px 10px; }
            nav button { font-size: 13px; margin: 2px; }
            .hero h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <!-- NAVIGASI UTAMA (MENU ATAS) -->
    <header>
        <div class="logo">🏸 Jago Badminton</div>
        <nav>
            <button onclick="changeSlide('slide-beranda')" id="btn-slide-beranda" class="active">Slide 1: Beranda</button>
            <button onclick="changeSlide('slide-servis')" id="btn-slide-servis')">Slide 2: Servis</button>
            <button onclick="changeSlide('slide-lob')" id="btn-slide-lob')">Slide 3: Lob</button>
            <button onclick="changeSlide('slide-smash')" id="btn-slide-smash')">Slide 4: Smash</button>
            <button onclick="changeSlide('slide-drop-net')" id="btn-slide-drop-net')">Slide 5: Drop & Net</button>
        </nav>
    </header>

    <!-- SLIDE 1: BERANDA -->
    <div id="slide-beranda" class="slide active-slide">
        <section class="hero">
            <h1>Kuasai Lapangan, Jadi Juara!</h1>
            <p>Selamat datang di platform belajar badminton online. Temukan 5 materi teknik dasar esensial yang dibagi menjadi 5 rangkaian slide interaktif.</p>
            <button class="btn btn-large" onclick="changeSlide('slide-servis')">Mulai Lihat Slide Kedua</button>
        </section>

        <div class="menu-grid">
            <button class="btn" onclick="changeSlide('slide-servis')">Slide 2: Servis</button>
            <button class="btn" onclick="changeSlide('slide-lob')">Slide 3: Pukulan Lob</button>
            <button class="btn" onclick="changeSlide('slide-smash')">Slide 4: Pukulan Smash</button>
            <button class="btn" onclick="changeSlide('slide-drop-net')">Slide 5: Drop & Netting</button>
